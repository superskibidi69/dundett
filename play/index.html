<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DUNDETT — Play in Browser</title>
    <meta name="description" content="Play DUNDETT directly in your browser. A text adventure about a missing boy, a grue, and a door behind the altar.">
    <meta name="robots" content="noindex, follow">
    <meta property="og:title" content="DUNDETT Web Edition">
    <meta property="og:description" content="A text adventure. No calculator required. The Grue is waiting.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dundett.pages.dev/play">
    <link rel="canonical" href="https://dundett.pages.dev/play">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #3aff3a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 255, 0, 0.04) 0px,
                    rgba(0, 255, 0, 0.04) 3px,
                    transparent 3px,
                    transparent 6px);
            animation: scanMove 0.2s linear infinite;
        }

        @keyframes scanMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(6px); }
        }

        .crt-line {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(58, 255, 58, 0.3);
            z-index: 1000;
            pointer-events: none;
            animation: crtRoll 8s linear infinite;
        }

        @keyframes crtRoll {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .game-container {
            background: #1a1a1a;
            border: 4px solid #3a3a3a;
            border-radius: 14px;
            padding: 20px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 0 40px rgba(58, 255, 58, 0.15);
            position: relative;
            z-index: 1001;
        }

        .brand {
            text-align: center;
            color: #4a4a4a;
            font-size: 10px;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .screen {
            background: #0a1f0a;
            border: 3px solid #1a3a1a;
            border-radius: 6px;
            padding: 20px;
            min-height: 300px;
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.6);
            margin-bottom: 20px;
        }

        .location-name {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: #3aff3a;
            text-transform: uppercase;
        }

        .description {
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #6aff6a;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-btn {
            background: #1a2a1a;
            border: 2px solid #2a4a2a;
            color: #3aff3a;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-btn:hover {
            background: #2a3a2a;
            border-color: #3aff3a;
            box-shadow: 0 0 8px rgba(58, 255, 58, 0.3);
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: #4a6a4a;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #2a4a2a;
        }

        .warning {
            text-align: center;
            font-size: 8px;
            color: #3a5a3a;
            margin-top: 15px;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .game-container { padding: 15px; }
            .screen { padding: 15px; }
            .location-name { font-size: 14px; }
            .description { font-size: 11px; }
            .menu-btn { padding: 8px; font-size: 10px; }
        }
    </style>
</head>

<body>
    <div class="scanlines"></div>
    <div class="crt-line"></div>

    <div class="game-container">
        <div class="brand">TI-84 Plus CE ▸ DUNDETT WEB EDITION</div>

        <div class="screen">
            <div class="location-name" id="locationName">LOADING...</div>
            <div class="description" id="description">Initializing DUNDETT...</div>
            <div class="menu" id="menu"></div>
        </div>

        <div class="status-bar">
            <span id="status">FUN: ???</span>
            <span id="debug">MAPLE STREET</span>
        </div>
        <div class="warning">The Grue is waiting in the dark.</div>
    </div>

    <script>
        // DUNDETT Web Edition - Pure JS, No Emulator
        // v1.3.4 Web Port

        // Game State
        let currentLocation = "deadEnd";
        let memoryFragments = [0,0,0,0,0];
        let sanity = 0;
        let deathCount = 0;
        let fun = Math.floor(Math.random() * 100) + 1;
        let safeCode = Math.floor(Math.random() * 900) + 100;
        let hasKey = 0;
        let hasLamp = 0;
        let lampLit = 0;
        let crystalKey = 0;
        let bearFed = 0;

        // Location Data
        const locations = {
            deadEnd: {
                name: "DEAD END",
                desc: "You are at a dead end of a dirt road. The road goes east. In the distance you can see it will fork. The palms are still. Too still.",
                options: ["GO EAST"],
                actions: [() => changeLocation("dirtRoad")]
            },
            dirtRoad: {
                name: "DIRT ROAD",
                desc: "You are on a dirt road. Trees line both sides. The road continues east and west.",
                options: ["GO EAST", "GO WEST"],
                actions: [() => changeLocation("fork"), () => changeLocation("deadEnd")]
            },
            fork: {
                name: "FORK",
                desc: "You are at a fork. Passages lead NE and SE. You can also go back west.",
                options: ["GO NE", "GO SE", "GO WEST"],
                actions: [() => changeLocation("neRoad"), () => changeLocation("seRoad"), () => changeLocation("dirtRoad")]
            },
            neRoad: {
                name: "NE/SW ROAD",
                desc: "You are on a NE/SW road. The path is well-worn.",
                options: ["GO NE", "GO SW"],
                actions: [() => changeLocation("building"), () => changeLocation("fork")]
            },
            building: {
                name: "BUILDING ENTRANCE",
                desc: hasKey ? "You use the key. The door creaks open. You enter a musty hallway." : "A sturdy wooden building stands before you. The door is locked. You need a key.",
                options: hasKey ? ["GO NORTH", "GO EAST", "GO WEST", "GO BACK"] : ["GO BACK", "FEED BEAR"],
                actions: hasKey 
                    ? [() => changeLocation("kitchen"), () => changeLocation("darkRoom"), () => changeLocation("altar"), () => changeLocation("neRoad")]
                    : [() => changeLocation("neRoad"), () => bearEncounter()]
            },
            bearArea: {
                name: "BEAR HANGOUT",
                desc: bearFed ? "The bear is gone. The area is peaceful. A passage leads NW." : "A ferocious bear is here! He watches you.",
                options: bearFed ? ["GO NW"] : ["GO NW", "FEED BEAR"],
                actions: bearFed ? [() => changeLocation("seRoad")] : [() => changeLocation("seRoad"), () => feedBear()]
            },
            kitchen: {
                name: "KITCHEN",
                desc: `An old kitchen with a dusty hearth. Rusty pots hang on the wall. Numbers on the wall: ${safeCode}`,
                options: ["GO SOUTH"],
                actions: [() => changeLocation("building")]
            },
            darkRoom: {
                name: "DARK ROOM",
                desc: lampLit ? "The lamp illuminates the room. Passages lead north, east, and west." : "This room is pitch black. You are likely to be eaten by a grue.",
                options: lampLit ? ["GO NORTH", "GO EAST", "GO WEST"] : ["SEARCH FOR LAMP", "GO BACK"],
                actions: lampLit ? [() => changeLocation("storage"), () => changeLocation("treasureVault"), () => changeLocation("building")] : [() => findLamp(), () => grueAttack()]
            },
            storage: {
                name: "STORAGE ROOM",
                desc: "Old crates and barrels fill this room. Spiderwebs cover everything. There is a safe with a 3-digit lock.",
                options: ["ENTER CODE", "GO BACK"],
                actions: [() => openSafe(), () => changeLocation("darkRoom")]
            },
            treasureVault: {
                name: "TREASURE VAULT",
                desc: crystalKey ? "The vault is open. A gleaming crystal key sits inside." : "A large safe on the wall. It needs a 3-digit code.",
                options: crystalKey ? ["TAKE KEY", "GO BACK"] : ["GO BACK"],
                actions: crystalKey ? [() => takeCrystalKey(), () => changeLocation("darkRoom")] : [() => changeLocation("darkRoom")]
            },
            altar: {
                name: "ALTAR OF SACRIFICE",
                desc: "A stone altar with a dark pit in the center. It craves something.",
                options: crystalKey ? ["SACRIFICE KEY", "GO BACK"] : ["GO BACK"],
                actions: crystalKey ? [() => sacrificeKey(), () => changeLocation("building")] : [() => changeLocation("building")]
            },
            ending: {
                name: "SMITH'S OFFICE",
                desc: "A man sits at a desk. He wears a suit. 'I knew you'd come. The key was always meant to be sacrificed. Now you can leave.' He points to a door.",
                options: ["LEAVE"],
                actions: [() => escape()]
            },
            mapleStreet: {
                name: "MAPLE STREET",
                desc: "You stand on a quiet suburban street. The houses are empty. The air is still. 680, 682, and 684 line the north side.",
                options: ["HOUSE 680", "HOUSE 682", "HOUSE 684", "SCHOOL", "BASEMENT"],
                actions: [() => changeLocation("house680"), () => lockedHouse(), () => lockedHouse(), () => changeLocation("school"), () => basementDeath()]
            },
            house680: {
                name: "HOUSE 680",
                desc: "The door creaks open. Dusty entry hall. A living room lies north.",
                options: ["GO NORTH", "GO BACK"],
                actions: [() => changeLocation("livingRoom"), () => changeLocation("mapleStreet")]
            },
            livingRoom: {
                name: "LIVING ROOM",
                desc: "A couch covered in a white sheet. A photograph sits on the mantel. 'Thomas Stock, age 12.' That was you." + (memoryFragments[0] ? "" : " [MEMORY FRAGMENT]"),
                options: ["GO BACK"],
                actions: [() => { if(!memoryFragments[0]) memoryFragments[0]=1; changeLocation("house680"); }]
            },
            school: {
                name: "SCHOOL",
                desc: "A boarded-up building. One door hangs open. Inside smells like dust and old paper.",
                options: ["ENTER", "GO BACK"],
                actions: [() => changeLocation("computerLab"), () => changeLocation("mapleStreet")]
            },
            computerLab: {
                name: "COMPUTER LAB",
                desc: "Rows of dusty monitors. One screen glows. 'THE FUNNY NUMBER IS THE KEY.' Your FUN value is " + fun + ".",
                options: ["GO BACK"],
                actions: [() => changeLocation("school")]
            }
        };

        function changeLocation(loc) {
            currentLocation = loc;
            render();
        }

        function bearEncounter() {
            if(!bearFed) {
                showMessage("The bear tears your head off. You are dead.");
                deathCount++;
                resetGame();
            }
        }

        function feedBear() {
            bearFed = 1;
            hasKey = 1;
            showMessage("You offer food to the bear. It gobbles it down and leaves a key behind. It wanders off into the forest.");
            changeLocation("bearArea");
        }

        function findLamp() {
            hasLamp = 1;
            lampLit = 1;
            showMessage("You feel around and find an oil lamp. It is full of oil. You light it.");
            changeLocation("darkRoom");
        }

        function grueAttack() {
            showMessage("In the pitch black, you hear a slithering sound. A grue devours you. You are dead.");
            deathCount++;
            resetGame();
        }

        function openSafe() {
            let code = prompt("ENTER 3 DIGITS:", "");
            if(parseInt(code) === safeCode) {
                crystalKey = 1;
                showMessage("The safe clicks open. Inside is a gleaming crystal key.");
            } else {
                showMessage("WRONG CODE. The safe explodes! You are killed instantly.");
                deathCount++;
                resetGame();
            }
            render();
        }

        function takeCrystalKey() {
            crystalKey = 1;
            showMessage("You take the crystal key.");
            changeLocation("darkRoom");
        }

        function sacrificeKey() {
            showMessage("You place the crystal key on the altar. It glows... The altar opens. A door appears.");
            changeLocation("ending");
        }

        function escape() {
            showMessage("You step through. The sun warms your face. You are free.");
            showMessage("...OR ARE YOU?");
            resetGame();
        }

        function lockedHouse() {
            showMessage("The door is locked. Maybe later...");
            render();
        }

        function basementDeath() {
            showMessage("You accidentally trip on the stairs and die. What a bad way to go...");
            deathCount++;
            resetGame();
        }

        function showMessage(msg) {
            document.getElementById('description').innerHTML = msg;
            document.getElementById('menu').innerHTML = '<button class="menu-btn" onclick="continueGame()">CONTINUE</button>';
        }

        function continueGame() {
            render();
        }

        function resetGame() {
            currentLocation = "deadEnd";
            memoryFragments = [0,0,0,0,0];
            sanity = 0;
            hasKey = 0;
            hasLamp = 0;
            lampLit = 0;
            crystalKey = 0;
            bearFed = 0;
            fun = Math.floor(Math.random() * 100) + 1;
            safeCode = Math.floor(Math.random() * 900) + 100;
            render();
        }

        function render() {
            const loc = locations[currentLocation];
            if(!loc) return;

            document.getElementById('locationName').innerText = loc.name;
            document.getElementById('description').innerHTML = loc.desc;
            document.getElementById('status').innerHTML = `FUN: ${fun} | SANITY: ${sanity} | DEATHS: ${deathCount}`;
            document.getElementById('debug').innerHTML = currentLocation.toUpperCase();

            const menuDiv = document.getElementById('menu');
            menuDiv.innerHTML = '';

            loc.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'menu-btn';
                btn.innerText = opt;
                btn.onclick = loc.actions[i];
                menuDiv.appendChild(btn);
            });
        }

        window.changeLocation = changeLocation;
        window.continueGame = continueGame;

        // Easter eggs
        console.log("%cDUNDETT WEB EDITION", "color:#3aff3a;font-family:monospace;font-size:16px;");
        console.log("%cThe Grue is watching.", "color:#6aff6a;font-family:monospace;");
        window.grue = () => console.log("%c👁️ THE GRUE SEES YOU 👁️", "color:#ff3a3a;font-family:monospace;font-size:14px;");

        render();
    </script>
</body>

</html>
