<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <meta name='robots' content='noindex'>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #3aff3a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.03) 0px,
                rgba(0, 255, 0, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            animation: scanMove 0.2s linear infinite;
        }

        @keyframes scanMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        .scanlines::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.1);
            opacity: 0;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0; }
            50% { opacity: 0.05; }
            100% { opacity: 0; }
        }

        /* CRT Power-On Line */
        .crt-line {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(58, 255, 58, 0.3);
            z-index: 1000;
            pointer-events: none;
            animation: crtRoll 8s linear infinite;
            box-shadow: 0 0 20px rgba(58, 255, 58, 0.2);
        }

        @keyframes crtRoll {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .container {
            max-width: 700px;
            width: 90%;
            padding: 2rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* The Grue's Eye */
        .grue-eye {
            width: 80px;
            height: 40px;
            margin: 0 auto 2rem auto;
            position: relative;
        }

        .grue-eye svg {
            width: 100%;
            animation: grueBlink 6s infinite;
            height: 100%;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 8px;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px #3aff3a;
            animation: textGlitch 4s infinite;
        }

        @keyframes textGlitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 1px); }
            94% { transform: translate(2px, -1px); }
            96% { transform: translate(0); }
        }

        .error-box {
            border: 1px solid #2a4a2a;
            border-radius: 8px;
            background: #0a1f0a;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
        }
@keyframes grueBlink {
    0%, 95%, 100% { transform: scaleY(1); }
    96%, 99% { transform: scaleY(0.05); }
}

        .error-box p {
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 0.5rem;
            color: #6aff6a;
        }

        .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #3aff3a;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

          @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .btn {
            display: inline-block;
            background: #1a2a1a;
            border: 1px solid #3aff3a;
            color: #3aff3a;
            padding: 0.8rem 2rem;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            animation: pulse 2s infinite;
        }

        .btn:hover {
            background: #2a3a2a;
            box-shadow: 0 0 15px #3aff3a;
        }

        .btn::after {
            content: "";
            position: absolute;
            top: -2px; left: -2px;
            right: -2px; bottom: -2px;
            border: 1px solid rgba(58, 255, 58, 0.3);
            border-radius: 6px;
            animation: btnPulse 2s infinite;
            pointer-events: none;
        }

        @keyframes btnPulse {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .quote {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #4a6a4a;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="crt-line"></div>

    <div class="container">
        <!-- The Grue's Eye -->
        <div class="grue-eye">
            <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
                <!-- Eye background (dark) -->
                <ellipse cx="60" cy="30" rx="55" ry="25" fill="#0a0a0a" stroke="#2a4a2a" stroke-width="1.5"/>
                <!-- Iris glow -->
                <ellipse cx="60" cy="30" rx="20" ry="18" fill="#1a3a1a" opacity="0.6">
                    <animate attributeName="rx" values="20;22;20" dur="4s" repeatCount="indefinite"/>
                </ellipse>
                <!-- Pupil -->
                <g class="pupil">
                    <ellipse cx="60" cy="30" rx="8" ry="14" fill="#3aff3a">
                        <animate attributeName="ry" values="14;6;14" dur="4s" repeatCount="indefinite"/>
                    </ellipse>
                    <!-- Pupil glow -->
                    <ellipse cx="60" cy="30" rx="4" ry="6" fill="#6aff6a" opacity="0.5"/>
                </g>
            </svg>
        </div>

        <h1>404 Not Found</h1>
        
        <div class="error-box">
            <p>You have wandered into the dark.</p>
            <p>No grue here,<span class="cursor-blink"></span></p>
            <p style="font-size: 0.85rem; color: #4a6a4a; margin-top: 1rem;">Just a missing page.</p>
        </div>

        <a href="/" class="btn">RETURN TO HOME</a>

        <div class="quote">
            "Tall royal palms are spaced equidistantly. This page is not."
        </div>
    </div>
    <script>
        const quotes = [
    '"Tall royal palms are spaced equidistantly. This page is not."',
    '"You hear breathing."',
    '"The grue is close."',
    '"You are likely to be eaten by a 404."',
    '"You step back from the 404."',
    '"Room 101 is off limits. So is this URL."',
    '"SOMETHING MOVES. But not this page."'
];
let quoteIndex = 0;
document.querySelector('.quote').addEventListener('dblclick', () => {
    quoteIndex = (quoteIndex + 1) % quotes.length;
    document.querySelector('.quote').textContent = quotes[quoteIndex];
});

const konami = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','KeyB','KeyA'];
let konamiIndex = 0;
document.addEventListener('keydown', (e) => {
    if (e.code === konami[konamiIndex]) {
        konamiIndex++;
        if (konamiIndex === konami.length) {
            window.location.href = '/';
            konamiIndex = 0;
        }
    } else { konamiIndex = 0; }
});
document.addEventListener('mousemove', (e) => {
    const eye = document.querySelector('.grue-eye');
    if (!eye) return;
    const rect = eye.getBoundingClientRect();
    const eyeCenterX = rect.left + rect.width / 2;
    const eyeCenterY = rect.top + rect.height / 2;
    
    // Calculate how far mouse is from eye center (normalized -1 to 1)
    const dx = Math.max(-1, Math.min(1, (e.clientX - eyeCenterX) / (window.innerWidth / 3)));
    const dy = Math.max(-1, Math.min(1, (e.clientY - eyeCenterY) / (window.innerHeight / 3)));
    
    // Apply smooth movement to pupil
    const pupil = eye.querySelector('.pupil');
    if (pupil) {
        pupil.style.transform = `translate(${dx * 10}px, ${dy * 6}px)`;
        pupil.style.transition = 'transform 0.15s ease-out';
    }
    
    // Subtle iris dilation based on mouse distance from eye
    const distance = Math.sqrt(dx*dx + dy*dy);
    const iris = eye.querySelector('ellipse[fill="#1a3a1a"]');
    if (iris) {
        const baseRx = 20;
        const dilation = distance * 3;
        iris.setAttribute('rx', baseRx + dilation);
    }
});
// ── RANDOM CREEPY MESSAGE (25% chance) ──
const creepyMessages = [
    "IT KNOWS YOU'RE HERE.",
    "DON'T LOOK BEHIND YOU.",
    "THE PAGE IS GONE. YOU ARE NOT.",
    "404: GRUE NOT FOUND.",
    "THIS IS NOT THE PAGE YOU'RE LOOKING FOR.",
    "THE DARK REMEMBERS YOU.",
    "YOU'VE BEEN HERE BEFORE.",
    "MAPLE STREET IS WAITING."
];

if (Math.random() < 0.25) {
    const extra = document.createElement('p');
    extra.style.cssText = 'font-size: 0.75rem; color: #3a5a3a; margin-top: 0.5rem; font-style: italic;';
    extra.textContent = creepyMessages[Math.floor(Math.random() * creepyMessages.length)];
    document.querySelector('.error-box').appendChild(extra);
}
let eyeHoverTimer;
document.querySelector('.grue-eye').addEventListener('mouseenter', () => {
    eyeHoverTimer = setTimeout(() => {
        const whisper = document.createElement('p');
        whisper.textContent = 'it sees you';
        whisper.style.cssText = 'position:absolute;top:100%;left:50%;transform:translateX(-50%);font-size:0.6rem;color:#3a5a3a;font-style:italic;animation:fadeInOut 2s forwards;pointer-events:none;';
        document.querySelector('.grue-eye').appendChild(whisper);
        setTimeout(() => whisper.remove(), 2000);
    }, 3000);
});
document.querySelector('.grue-eye').addEventListener('mouseleave', () => {
    clearTimeout(eyeHoverTimer);
});
let visits = parseInt(localStorage.getItem('dundett_404_visits') || 0);
visits++;
localStorage.setItem('dundett_404_visits', visits);

if (visits >= 5) {
    const msg = document.createElement('p');
    msg.style.cssText = 'font-size:0.7rem;color:#3a5a3a;margin-top:1rem;font-style:italic;';
    msg.textContent = visits >= 10 ? 'You have been here ' + visits + ' times. The dark expects you now.' : 'You keep ending up here. Are you lost, or are you looking for something?';
    document.querySelector('.error-box').appendChild(msg);
}

    </script>
</body>
</html>
